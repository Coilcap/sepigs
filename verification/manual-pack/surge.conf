# Replace SEPIGS_* values, import this profile in Surge, select SEPIGS, and enable it.
# Test URL: https://example.com/
# Success: page loads through sepigs and a matching Dashboard connection appears.
# Failure checks: trusted-LAN reachability, credentials, firewall, port 1080, and Surge logs.
# Rollback: stop this profile and restore the previous profile.
#
# | Tester | App version | Date | Request | Rollback | Result | Notes |
# | --- | --- | --- | --- | --- | --- | --- |
# |  |  |  | pending | pending | pending |  |
[General]
loglevel = notify

[Proxy]
sepigs-socks = socks5, SEPIGS_HOST, 1080, username=SEPIGS_USERNAME, password=SEPIGS_PASSWORD

[Proxy Group]
SEPIGS = select, sepigs-socks

[Rule]
FINAL,SEPIGS
